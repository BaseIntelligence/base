[project]
name = "agent-challenge"
version = "1.0.1"
description = "Evaluates software engineering agents on benchmark tasks and converts results into BASE weights"
requires-python = ">=3.12"
dependencies = [
  "aiosqlite>=0.20.0",
  "asyncpg>=0.29",
  "cryptography>=42.0.0",
  "fastapi>=0.115.0",
  "httpx>=0.27.0",
  # Workspace member: resolved via root [tool.uv.sources] base = { workspace = true }
  "base",
  "bittensor>=9,<11",
  "dstack-sdk>=0.5.4",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "sqlalchemy[asyncio]>=2.0.32",
  "uvicorn[standard]>=0.30.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_challenge", "src/agent_challenge_runner"]

[tool.hatch.metadata]
allow-direct-references = true

[project.optional-dependencies]
dev = [
  "hatchling>=1.25.0",
  "pytest>=8.3.0",
  "pytest-asyncio>=0.23.0",
  "pytest-cov>=5.0.0",
  "ruff>=0.6.0",
]

[project.scripts]
agent-challenge-worker = "agent_challenge.evaluation.worker:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Terminal-Bench task fixtures vendored for live-prep smoke (upstream style; not product code)
extend-exclude = ["docker/canonical/live-task-cache"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]

[tool.ruff.format]
quote-style = "double"
