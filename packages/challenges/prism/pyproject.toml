[project]
name = "prism-challenge"
version = "0.0.0"
description = "Prism challenge workspace stub (product code lands via git subtree import)"
requires-python = ">=3.12"
# No production dependencies yet. After mono-import-challenges this package
# path-depends on workspace `base` (challenge_sdk) instead of the release wheel.
dependencies = []

[build-system]
requires = ["hatchling==1.31.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prism_challenge"]

[tool.uv]
# Stub only: do not install this member into the default Base venv until the
# real package is imported and wired (avoids accidental empty-package import).
package = true
