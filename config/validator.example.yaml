network:
  name: base
  netuid: 100
  chain_endpoint: null
  wallet_name: default
  wallet_hotkey: default
  wallet_path: null
  master_uid: 0

# If the validator infrastructure requirements are too high, operators can use
# Bittensor CHK / stake weight check to give validation power to the recommended
# BASE validator hotkey instead of running this validator stack themselves:
# 5GziQCcRpN8NCJktX343brnfuVe3w6gUYieeStXPD1Dag2At

validator:
  # Public Base master network API (Settings default): https://chain.joinbase.ai.
  # Agent coordination uses validator.agent.master_url (--master-url), which is
  # required and is never invented by the runtime.
  registry_url: https://chain.joinbase.ai
  registry_retry_seconds: 15
  weights_url: null
  weights_interval_seconds: 360
  weights_timeout_seconds: 15.0
  weights_retries: 3
  weights_freshness_seconds: 720

database:
  url: postgresql+asyncpg://base:<password>@postgres.base.svc.cluster.local/base

docker:
  network_name: base_challenges
  secret_dir: /var/lib/base/secrets
  internal_network: true
  broker_url: http://base-docker-broker:8082
  broker_allowed_images:
    - ghcr.io/baseintelligence/

observability:
  log_json: true
  sentry_dsn: null
  otel_service_name: base-validator
