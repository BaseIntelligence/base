name: ${COMPOSE_PROJECT_NAME:?set a unique validator project name}

# Independent, agent-only, source-free validator project.
# - Validators NEVER run master, master PostgreSQL, or challenge control-plane services.
# - Host docker.sock is mounted (prod prep for a later challenges-on-validator path).
# - Distinct project name, network, volume, credentials, identity, and state.
# - Config must set validator.agent.master_url to an external Base master API
#   (install-validator.sh --master-url). Prefer https://chain.joinbase.ai for
#   network validators; local smoke uses an explicit loopback --master-url only.
# - Operators install via install-validator.sh or:
#     docker compose -p <unique> -f docker-compose.validator.yml up -d

services:
  validator:
    image: >-
      ${BASE_VALIDATOR_IMAGE_REPOSITORY:?set the immutable validator image repository}@sha256:${BASE_VALIDATOR_IMAGE_DIGEST:?set the immutable validator image digest}
    command:
      - base
      - validator
      - agent
      - --config
      - /run/base/validator.yaml
    restart: unless-stopped
    read_only: true
    init: true
    user: "1000:1000"
    # Host docker group so non-root uid 1000 can use the mounted socket
    # (same pattern as master compose; detect via install-validator.sh / BASE_DOCKER_GID).
    group_add:
      - "${BASE_DOCKER_GID:-987}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      # Config drives master_url + identity. No master/db control-plane paths.
      # HOME must sit on the writable state volume: read_only:true makes
      # /var/lib/base itself non-writable, and bittensor writes under
      # $HOME/.bittensor (identity caches + wallet side data).
      HOME: /var/lib/base/state
    volumes:
      - type: bind
        source: ${BASE_VALIDATOR_CONFIG:?set the validator config file}
        target: /run/base/validator.yaml
        read_only: true
      - type: bind
        source: ${BASE_VALIDATOR_PROTOCOL_IDENTITY:?set the protocol identity directory}
        target: /var/lib/base/identity
        read_only: true
      - type: bind
        source: ${BASE_VALIDATOR_BROKER_TOKEN:?set the broker token file}
        target: /run/secrets/base_broker_token
        read_only: true
      # Host Docker socket (read/write) for later challenges-on-validator migration prep.
      # Image auto-update still runs host-side; this project remains agent-only (no master
      # / postgres / marketplace stack).
      - type: bind
        source: ${BASE_DOCKER_SOCKET:-/var/run/docker.sock}
        target: /var/run/docker.sock
      - type: volume
        source: validator-state
        target: /var/lib/base/state
    tmpfs:
      - /tmp:size=256m,mode=1777
    networks:
      - validator
    # No published ports required: the validator is an outbound client of master.
    # No healthcheck HTTP surface required; restart policy + logs are operator signals.

networks:
  validator:
    name: ${COMPOSE_PROJECT_NAME}_network
    driver: bridge

volumes:
  validator-state:
    name: ${COMPOSE_PROJECT_NAME}_state
