# Canonical master config synced by the supervisor (`base master supervisor`).
# Secrets (database password, admin token) are injected via environment
# (BASE_DATABASE__URL, BASE_SECURITY__ADMIN_TOKEN_FILE) or secret files
# and are never committed here.
network:
  name: base
  netuid: 100
  chain_endpoint: null
  wallet_name: default
  wallet_hotkey: default
  wallet_path: null
  master_uid: 0

master:
  registry_url: https://chain.joinbase.ai
  proxy_host: 0.0.0.0
  proxy_port: 8081
  epoch_interval_seconds: 360
  metagraph_cache_ttl_seconds: 300
  registry_state_file: /var/lib/base/registry.json
  # Validator coordination plane (architecture.md sec 4): heartbeat cadence +
  # offline timeout, the in-app crash-detection loop interval, the assignment
  # lease, and the live orchestration driver interval. Persisted into the same
  # control-plane Postgres wired in `database` below.
  validator_heartbeat_interval_seconds: 60
  validator_heartbeat_timeout_seconds: 180
  validator_health_interval_seconds: 60
  assignment_lease_seconds: 900
  orchestration_interval_seconds: 30

validator:
  registry_url: https://chain.joinbase.ai
  registry_retry_seconds: 15
  weights_url: null
  weights_interval_seconds: 360
  weights_timeout_seconds: 15.0
  weights_retries: 3
  weights_freshness_seconds: 720

database:
  # Override the password via BASE_DATABASE__URL in production.
  url: postgresql+asyncpg://base:base@base-master-postgres:5432/base

docker:
  network_name: base_challenges
  secret_dir: /var/lib/base/secrets
  internal_network: true
  broker_host: 0.0.0.0
  broker_port: 8082
  broker_url: http://base-docker-broker:8082
  broker_workspace_dir: /tmp/base-docker-broker
  broker_allowed_images:
    - ghcr.io/baseintelligence/
  # Challenge API services run on the manager; broker jobs run on labeled workers.
  challenge_placement_constraint: node.role==manager
  cpu_job_constraint: node.labels.base.workload==cpu
  gpu_job_constraint: node.labels.base.workload==gpu

security:
  admin_token_file: /var/lib/base/secrets/admin_token

# Master LLM gateway (architecture.md sec 5). `base master proxy` ALWAYS builds
# the gateway; provider_mode selects the deterministic mock provider (no egress)
# vs the real DeepSeek/OpenRouter clients whose keys are injected server-side from
# the secret files below (validators/eval runtimes hold NO provider key).
# public_base_url is the external master gateway root advertised to validators in
# the pull payload so eval runtimes target the gateway for
# DEEPSEEK_BASE_URL/OPENROUTER_BASE_URL, NOT the master.registry_url (chain
# registry) fallback. token_secret_file is the MANDATORY HMAC secret for scoped
# gateway tokens; the proxy fails fast at startup if it is absent.
gateway:
  provider_mode: real
  public_base_url: http://51.83.112.164:18080
  token_secret_file: /run/secrets/gateway_token_secret
  deepseek_api_key_file: /run/secrets/deepseek_api_key
  openrouter_api_key_file: /run/secrets/openrouter_api_key

observability:
  log_json: true
  sentry_dsn: null
  otel_service_name: base-master
