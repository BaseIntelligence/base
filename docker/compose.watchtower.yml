x-platform-watchtower-hardening: &platform-watchtower-hardening
  init: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 512
  cpus: 1
  mem_limit: 512m
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=128m

services:
  master-admin:
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  master-proxy:
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  platform-docker-broker:
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  validator:
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  gpu-agent:
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    <<: *platform-watchtower-hardening
    image: nickfedor/watchtower:1.17.1
    command:
      - --label-enable
      - --interval
      - "300"
      - --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      platform.security.docker-socket: watchtower-profile-local-updates-only
      platform.security.docker-socket-risk: host-daemon-access-is-not-production-isolation
    restart: unless-stopped
    networks:
      - platform_backend
